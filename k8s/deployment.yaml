apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments-api
          image: fcg/payments-api:cors-v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payments-api-config
            - secretRef:
                name: fcg-secrets
          env:
            - name: ConnectionStrings__Database
              valueFrom:
                secretKeyRef:
                  name: fcg-secrets
                  key: PaymentsDatabase
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
